<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stabiel Digibord - Volledig Dragable</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; overflow: hidden; }
        #board-container { 
            position: relative; width: 95%; max-width: 1200px; aspect-ratio: 12 / 8;
            background: #fafafa; margin: 20px auto; border: 1px solid #d1d5db; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); touch-action: none;
        }
        canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
        .toolbar { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; background: white; padding: 12px; border-radius: 8px; border: 1px solid #d1d5db; z-index: 10; }
        input[type="text"] { padding: 10px; border: 1px solid #d1d5db; border-radius: 4px; width: 200px; font-size: 16px; }
        #addBtn { background: #a78bfa; color: white; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #clearBtn { background: #f3f4f6; color: #4b5563; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        #trash-zone { 
            position: absolute; bottom: 20px; right: 20px; width: 60px; height: 60px; 
            background: #fee2e2; border: 2px dashed #f87171; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            transition: all 0.2s; z-index: 10; opacity: 0.6;
        }
        #trash-zone.active { transform: scale(1.2); background: #f87171; opacity: 1; }
        #status { position: absolute; top: 10px; right: 20px; background: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div id="board-container">
    <canvas id="whiteboard" width="1200" height="800"></canvas>
    <div class="toolbar">
        <input type="text" id="wordInput" placeholder="Woord smijten...">
        <button id="addBtn">Smijt op bord</button>
        <button id="clearBtn">Wis alles</button>
    </div>
    <div id="trash-zone">🗑️</div>
    <div id="status">Verbinden...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3_rzoZOWytlyAbYKKe_WuFlD8z2WvbX4",
        authDomain: "aangifteq2les1.firebaseapp.com",
        databaseURL: "https://aangifteq2les1-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aangifteq2les1",
        storageBucket: "aangifteq2les1.firebasestorage.app",
        messagingSenderId: "1071661084879",
        appId: "1:1071661084879:web:ec81dfed806ad75a8847ba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const canvas = document.getElementById('whiteboard');
    const ctx = canvas.getContext('2d');
    const trashZone = document.getElementById('trash-zone');
    
    let currentClass = "Alpha";
    let objects = {}; 
    let isDrawing = false, isDragging = false, draggedId = null;
    let currentPathId = null;
    let offsetX = 0, offsetY = 0;

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { 
            x: (clientX - rect.left) * (canvas.width / rect.width), 
            y: (clientY - rect.top) * (canvas.height / rect.height) 
        };
    };

    const start = (e) => {
        if (e.type === 'touchstart') e.preventDefault();
        const { x, y } = getPos(e);
        
        draggedId = null;
        isDragging = false;
        isDrawing = false;

        // Check voor tekst of lijnen (pak het nieuwste object eerst)
        const entries = Object.entries(objects).reverse();
        for (const [id, obj] of entries) {
            let hit = false;
            if (obj.type === 'text') {
                ctx.font = "bold 22px 'Segoe UI'";
                const w = ctx.measureText(obj.text).width;
                hit = x > obj.x - 10 && x < obj.x + w + 10 && y > obj.y - 30 && y < obj.y + 10;
            } else if (obj.type === 'path' && obj.points) {
                // Hitbox voor lijnen: klik in de buurt van het startpunt
                hit = Math.hypot(x - obj.points[0].x, y - obj.points[0].y) < 25;
            }

            if (hit) {
                draggedId = id;
                isDragging = true;
                const startX = obj.type === 'text' ? obj.x : obj.points[0].x;
                const startY = obj.type === 'text' ? obj.y : obj.points[0].y;
                offsetX = x - startX;
                offsetY = y - startY;
                break;
            }
        }

        if (!isDragging) {
            isDrawing = true;
            const newPathRef = push(ref(db, `classes/${currentClass}/board`));
            currentPathId = newPathRef.key;
            set(newPathRef, { type: 'path', points: [{x, y}] });
        }
    };

    const move = (e) => {
        if (!isDrawing && !isDragging) return;
        if (e.type === 'touchmove') e.preventDefault();
        const { x, y } = getPos(e);

        if (isDragging && draggedId) {
            const obj = objects[draggedId];
            if (obj.type === 'text') {
                update(ref(db, `classes/${currentClass}/board/${draggedId}`), { x: x - offsetX, y: y - offsetY });
            } else if (obj.type === 'path') {
                const dx = (x - offsetX) - obj.points[0].x;
                const dy = (y - offsetY) - obj.points[0].y;
                const newPoints = obj.points.map(p => ({ x: p.x + dx, y: p.y + dy }));
                update(ref(db, `classes/${currentClass}/board/${draggedId}`), { points: newPoints });
            }
            
            // Trash feedback
            const tRect = trashZone.getBoundingClientRect();
            const cX = e.touches ? e.touches[0].clientX : e.clientX;
            const cY = e.touches ? e.touches[0].clientY : e.clientY;
            trashZone.classList.toggle('active', cX > tRect.left && cX < tRect.right && cY > tRect.top && cY < tRect.bottom);
        } 
        else if (isDrawing && currentPathId) {
            const path = objects[currentPathId];
            if (path && path.points) {
                const lastP = path.points[path.points.length - 1];
                if (Math.hypot(x - lastP.x, y - lastP.y) > 5) {
                    const updatedPoints = [...path.points, {x, y}];
                    update(ref(db, `classes/${currentClass}/board/${currentPathId}`), { points: updatedPoints });
                }
            }
        }
    };

    const stop = () => {
        if (isDragging && draggedId && trashZone.classList.contains('active')) {
            remove(ref(db, `classes/${currentClass}/board/${draggedId}`));
        }
        trashZone.classList.remove('active');
        isDrawing = false; isDragging = false; currentPathId = null; draggedId = null;
    };

    canvas.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start, { passive: false });
    window.addEventListener('touchmove', move, { passive: false });
    window.addEventListener('touchend', stop);

    document.getElementById('addBtn').onclick = () => {
        const val = document.getElementById('wordInput').value.trim();
        if(val) {
            push(ref(db, `classes/${currentClass}/board`), { type: 'text', text: val, x: 150, y: 150 });
            document.getElementById('wordInput').value = '';
        }
    };

    onValue(ref(db, `classes/${currentClass}/board`), snap => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        objects = snap.val() || {};
        
        ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        
        snap.forEach((child) => {
            const obj = child.val();
            if (obj.type === 'text') {
                ctx.font = "bold 22px 'Segoe UI'"; ctx.fillStyle = "#4b5563";
                ctx.fillText(obj.text, obj.x, obj.y);
            } else if (obj.type === 'path' && obj.points) {
                ctx.beginPath();
                ctx.strokeStyle = (child.key === draggedId) ? "#a78bfa" : "#4b5563"; // Kleur verandert bij slepen
                ctx.moveTo(obj.points[0].x, obj.points[0].y);
                obj.points.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.stroke();
                
                // Teken een klein sleep-bolletje aan het begin van de lijn
                ctx.fillStyle = "#d1d5db";
                ctx.beginPath();
                ctx.arc(obj.points[0].x, obj.points[0].y, 5, 0, Math.PI * 2);
                ctx.fill();
            }
        });
        document.getElementById('status').textContent = `Klasse: ${currentClass} | Objecten: ${snap.numChildren()}`;
    });

    document.getElementById('clearBtn').onclick = () => { if(confirm('Alles wissen?')) remove(ref(db, `classes/${currentClass}/board`)); };
</script>
</body>
</html>
