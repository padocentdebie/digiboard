<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digibord Pro - Zinsbouw & Tekenen</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; overflow: hidden; }
        
        /* Het bord */
        #board-container { 
            position: relative; width: 95vw; height: 75vh; 
            background: #ffffff; margin: 15px auto; border: 2px solid #003082; 
            border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); touch-action: none;
        }
        canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }

        /* Toolbar onderaan */
        .toolbar { 
            position: fixed; bottom: 0; width: 100%; background: #ffffff; 
            padding: 20px; display: flex; gap: 12px; justify-content: center;
            border-top: 2px solid #ddd; z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }
        
        input { padding: 12px; width: 300px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        .btn { padding: 12px 25px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        #addBtn { background: #003082; } /* Politie blauw */
        #clearBtn { background: #d32f2f; }
        #addBtn:hover { background: #001f57; }
        #clearBtn:hover { background: #a12323; }

        /* Status & Prullenbak */
        #status { 
            position: absolute; top: 15px; right: 20px; padding: 6px 15px; 
            border-radius: 20px; font-size: 12px; font-weight: bold;
            background: #ffebeb; color: #d32f2f; border: 1px solid #d32f2f;
        }
        #status.online { background: #ebffed; color: #2e7d32; border: 1px solid #2e7d32; }

        #trash-zone { 
            position: absolute; top: 15px; left: 20px; width: 60px; height: 60px; 
            background: #fee2e2; border: 2px dashed #f87171; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 28px; 
            opacity: 0.5; transition: 0.3s;
        }
        #trash-zone.active { transform: scale(1.2); background: #ef4444; opacity: 1; border-style: solid; }
    </style>
</head>
<body>

<div id="board-container">
    <canvas id="whiteboard" width="1200" height="800"></canvas>
    <div id="status">Status: Verbinden...</div>
    <div id="trash-zone">🗑️</div>
</div>

<div class="toolbar">
    <input type="text" id="wordInput" placeholder="Typ tekst of zinsdeel...">
    <button id="addBtn" class="btn">Voeg Tekst Toe</button>
    <button id="clearBtn" class="btn">Wis Hele Bord</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // JOUW SPECIFIEKE DATABASE CONFIGURATIE
    const firebaseConfig = {
        apiKey: "AIzaSyA3_rzoZOWytlyAbYKKe_WuFlD8z2WvbX4",
        authDomain: "aangifteq2les1.firebaseapp.com",
        databaseURL: "https://aangifteq2les1-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aangifteq2les1",
        storageBucket: "aangifteq2les1.firebasestorage.app",
        messagingSenderId: "1071661084879",
        appId: "1:1071661084879:web:ec81dfed806ad75a8847ba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const canvas = document.getElementById('whiteboard');
    const ctx = canvas.getContext('2d');
    const statusLabel = document.getElementById('status');
    const trashZone = document.getElementById('trash-zone');
    const currentClass = "Alpha";

    let objects = {};
    let isDrawing = false;
    let isDragging = false;
    let draggedId = null;
    let currentPathId = null;
    let offsetX = 0, offsetY = 0;

    // --- VERBINDINGS CHECK ---
    onValue(ref(db, ".info/connected"), (snap) => {
        if (snap.val() === true) {
            statusLabel.innerText = "● Systeem Online";
            statusLabel.classList.add('online');
        } else {
            statusLabel.innerText = "○ Offline / Verbinden...";
            statusLabel.classList.remove('online');
        }
    });

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    };

    // --- START ACTIE ---
    canvas.addEventListener('mousedown', (e) => {
        const { x, y } = getPos(e);
        draggedId = null; 
        isDragging = false;

        // Check of we een tekst raken
        const entries = Object.entries(objects).reverse();
        for (const [id, obj] of entries) {
            if (obj.type === 'text') {
                ctx.font = "bold 24px Arial";
                const w = ctx.measureText(obj.text).width;
                if (x > obj.x - 5 && x < obj.x + w + 5 && y > obj.y - 30 && y < obj.y + 10) {
                    draggedId = id;
                    isDragging = true;
                    offsetX = x - obj.x;
                    offsetY = y - obj.y;
                    return;
                }
            }
        }

        // Als geen tekst geraakt: start tekenen
        isDrawing = true;
        const newPathRef = push(ref(db, `classes/${currentClass}/board`));
        currentPathId = newPathRef.key;
        set(newPathRef, { type: 'path', points: [{x, y}] });
    });

    // --- BEWEGEN ---
    window.addEventListener('mousemove', (e) => {
        const { x, y } = getPos(e);

        if (isDragging && draggedId) {
            update(ref(db, `classes/${currentClass}/board/${draggedId}`), { x: x - offsetX, y: y - offsetY });
            
            // Prullenbak feedback
            const tRect = trashZone.getBoundingClientRect();
            trashZone.classList.toggle('active', e.clientX > tRect.left && e.clientX < tRect.right && e.clientY > tRect.top && e.clientY < tRect.bottom);
        } 
        else if (isDrawing && currentPathId) {
            const path = objects[currentPathId];
            if (path && path.points) {
                const lastP = path.points[path.points.length - 1];
                if (Math.hypot(x - lastP.x, y - lastP.y) > 5) {
                    update(ref(db, `classes/${currentClass}/board/${currentPathId}`), { 
                        points: [...path.points, {x, y}] 
                    });
                }
            }
        }
    });

    // --- STOP ACTIE ---
    window.addEventListener('mouseup', (e) => {
        if (isDragging && draggedId && trashZone.classList.contains('active')) {
            remove(ref(db, `classes/${currentClass}/board/${draggedId}`));
        }
        isDrawing = false;
        isDragging = false;
        draggedId = null;
        currentPathId = null;
        trashZone.classList.remove('active');
    });

    // --- KNOPPEN ---
    document.getElementById('addBtn').onclick = () => {
        const val = document.getElementById('wordInput').value.trim();
        if (val) {
            push(ref(db, `classes/${currentClass}/board`), {
                type: 'text', text: val, x: 150, y: 150
            });
            document.getElementById('wordInput').value = '';
        }
    };

    document.getElementById('clearBtn').onclick = () => {
        if (confirm("Hele bord wissen voor alle studenten?")) {
            remove(ref(db, `classes/${currentClass}/board`));
        }
    };

    // --- SYNC & RENDER ---
    onValue(ref(db, `classes/${currentClass}/board`), (snapshot) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        objects = snapshot.val() || {};
        
        snapshot.forEach((child) => {
            const obj = child.val();
            const isSelected = child.key === draggedId;

            if (obj.type === 'text') {
                ctx.font = "bold 24px Arial";
                ctx.fillStyle = isSelected ? "#003082" : "#333";
                ctx.fillText(obj.text, obj.x, obj.y);
                if (isSelected) {
                    ctx.strokeStyle = "#003082";
                    ctx.strokeRect(obj.x - 5, obj.y - 30, ctx.measureText(obj.text).width + 10, 40);
                }
            } else if (obj.type === 'path' && obj.points) {
                ctx.strokeStyle = "#4b5563";
                ctx.lineWidth = 3;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.beginPath();
                ctx.moveTo(obj.points[0].x, obj.points[0].y);
                obj.points.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.stroke();
            }
        });
    });
</script>
</body>
</html>
