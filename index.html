<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digibord Pro - Touch & Multi-user</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; overflow: hidden; position: fixed; width: 100%; }
        
        #board-container { 
            position: relative; width: 96vw; height: 72vh; 
            background: #ffffff; margin: 10px auto; border: 2px solid #003082; 
            border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            touch-action: none; /* Cruciaal: stopt standaard browser scroll gedrag */
        }
        canvas { width: 100%; height: 100%; display: block; cursor: crosshair; border-radius: 10px; }

        .toolbar { 
            position: fixed; bottom: 0; width: 100%; background: #ffffff; 
            padding: 15px; display: flex; gap: 10px; justify-content: center; align-items: center;
            border-top: 2px solid #ddd; z-index: 100; flex-wrap: wrap;
        }
        
        input { padding: 12px; width: 200px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; }
        #addBtn { background: #003082; }
        #clearBtn { background: #d32f2f; }

        #status { 
            position: absolute; top: 10px; right: 15px; padding: 5px 12px; 
            border-radius: 20px; font-size: 11px; font-weight: bold;
            background: #eee; border: 1px solid #ccc; z-index: 10;
        }
        #status.online { background: #ebffed; color: #2e7d32; border-color: #2e7d32; }

        #trash-zone { 
            position: absolute; top: 10px; left: 15px; width: 55px; height: 55px; 
            background: #fee2e2; border: 2px dashed #f87171; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 24px; 
            opacity: 0.6; transition: 0.2s; z-index: 10;
        }
        #trash-zone.active { transform: scale(1.2); background: #ef4444; opacity: 1; border-style: solid; }
    </style>
</head>
<body>

<div id="board-container">
    <canvas id="whiteboard" width="1200" height="800"></canvas>
    <div id="status">Status: Laden...</div>
    <div id="trash-zone">🗑️</div>
</div>

<div class="toolbar">
    <input type="text" id="wordInput" placeholder="Woord invoeren...">
    <button id="addBtn" class="btn">Toevoegen</button>
    <button id="clearBtn" class="btn">Wis Bord</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3_rzoZOWytlyAbYKKe_WuFlD8z2WvbX4",
        authDomain: "aangifteq2les1.firebaseapp.com",
        databaseURL: "https://aangifteq2les1-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aangifteq2les1",
        storageBucket: "aangifteq2les1.firebasestorage.app",
        messagingSenderId: "1071661084879",
        appId: "1:1071661084879:web:ec81dfed806ad75a8847ba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const canvas = document.getElementById('whiteboard');
    const ctx = canvas.getContext('2d');
    const statusLabel = document.getElementById('status');
    const trashZone = document.getElementById('trash-zone');
    const currentClass = "Alpha";

    let objects = {};
    let isDrawing = false, isDragging = false;
    let draggedId = null, currentPathId = null;
    let offsetX = 0, offsetY = 0;

    // Status sync
    onValue(ref(db, ".info/connected"), (snap) => {
        if (snap.val()) { statusLabel.innerText = "● LIVE"; statusLabel.classList.add('online'); }
    });

    // Universele positie berekening (Muis & Touch)
    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height),
            rawX: clientX,
            rawY: clientY
        };
    };

    const startAction = (e) => {
        const { x, y } = getPos(e);
        draggedId = null; isDragging = false;

        const entries = Object.entries(objects).reverse();
        for (const [id, obj] of entries) {
            if (obj.type === 'text') {
                ctx.font = "bold 24px Arial";
                const w = ctx.measureText(obj.text).width;
                if (x > obj.x - 10 && x < obj.x + w + 10 && y > obj.y - 35 && y < obj.y + 15) {
                    draggedId = id; isDragging = true;
                    offsetX = x - obj.x; offsetY = y - obj.y;
                    return;
                }
            }
        }
        isDrawing = true;
        const newPathRef = push(ref(db, `classes/${currentClass}/board`));
        currentPathId = newPathRef.key;
        set(newPathRef, { type: 'path', points: [{x, y}] });
    };

    const moveAction = (e) => {
        if (!isDragging && !isDrawing) return;
        const { x, y, rawX, rawY } = getPos(e);

        if (isDragging && draggedId) {
            update(ref(db, `classes/${currentClass}/board/${draggedId}`), { x: x - offsetX, y: y - offsetY });
            const tRect = trashZone.getBoundingClientRect();
            trashZone.classList.toggle('active', rawX > tRect.left && rawX < tRect.right && rawY > tRect.top && rawY < tRect.bottom);
        } else if (isDrawing && currentPathId) {
            const path = objects[currentPathId];
            if (path && path.points) {
                const lastP = path.points[path.points.length - 1];
                if (Math.hypot(x - lastP.x, y - lastP.y) > 5) {
                    update(ref(db, `classes/${currentClass}/board/${currentPathId}`), { 
                        points: [...path.points, {x, y}] 
                    });
                }
            }
        }
    };

    const stopAction = () => {
        if (isDragging && draggedId && trashZone.classList.contains('active')) {
            remove(ref(db, `classes/${currentClass}/board/${draggedId}`));
        }
        isDrawing = isDragging = false;
        draggedId = currentPathId = null;
        trashZone.classList.remove('active');
    };

    // Event Listeners voor Muis
    canvas.addEventListener('mousedown', startAction);
    window.addEventListener('mousemove', moveAction);
    window.addEventListener('mouseup', stopAction);

    // Event Listeners voor Touch (Mobiel/Tablet)
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(e); }, { passive: false });
    window.addEventListener('touchmove', (e) => { e.preventDefault(); moveAction(e); }, { passive: false });
    window.addEventListener('touchend', stopAction);

    // Knoppen
    document.getElementById('addBtn').onclick = () => {
        const val = document.getElementById('wordInput').value.trim();
        if (val) {
            push(ref(db, `classes/${currentClass}/board`), { type: 'text', text: val, x: 150, y: 150 });
            document.getElementById('wordInput').value = '';
        }
    };

    document.getElementById('clearBtn').onclick = () => {
        if (confirm("Hele bord wissen?")) remove(ref(db, `classes/${currentClass}/board`));
    };

    // Renderen
    onValue(ref(db, `classes/${currentClass}/board`), (snap) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        objects = snap.val() || {};
        snap.forEach((child) => {
            const obj = child.val();
            const isSel = child.key === draggedId;
            if (obj.type === 'text') {
                ctx.font = "bold 24px Arial";
                ctx.fillStyle = isSel ? "#003082" : "#333";
                ctx.fillText(obj.text, obj.x, obj.y);
                if (isSel) ctx.strokeRect(obj.x - 5, obj.y - 30, ctx.measureText(obj.text).width + 10, 40);
            } else if (obj.type === 'path' && obj.points) {
                ctx.strokeStyle = "#4b5563"; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.beginPath();
                ctx.moveTo(obj.points[0].x, obj.points[0].y);
                obj.points.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.stroke();
            }
        });
    });
</script>
</body>
</html>
