<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stabiel Digibord - Verbeterd</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; overflow: hidden; }
        #board-container { 
            position: relative; width: 95%; max-width: 1200px; aspect-ratio: 12 / 8;
            background: #fafafa; margin: 20px auto; border: 1px solid #d1d5db; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); touch-action: none;
        }
        canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
        .toolbar { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; background: white; padding: 12px; border-radius: 8px; border: 1px solid #d1d5db; z-index: 10; }
        input[type="text"] { padding: 10px; border: 1px solid #d1d5db; border-radius: 4px; width: 200px; font-size: 16px; }
        #addBtn { background: #a78bfa; color: white; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #clearBtn { background: #f3f4f6; color: #4b5563; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        #status { position: absolute; top: 10px; right: 20px; background: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div id="board-container">
    <canvas id="whiteboard" width="1200" height="800"></canvas>
    <div class="toolbar">
        <input type="text" id="wordInput" placeholder="Woord smijten...">
        <button id="addBtn">Smijt op bord</button>
        <button id="clearBtn">Wis alles</button>
    </div>
    <div id="status">Laden...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3_rzoZOWytlyAbYKKe_WuFlD8z2WvbX4",
        authDomain: "aangifteq2les1.firebaseapp.com",
        databaseURL: "https://aangifteq2les1-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aangifteq2les1",
        storageBucket: "aangifteq2les1.firebasestorage.app",
        messagingSenderId: "1071661084879",
        appId: "1:1071661084879:web:ec81dfed806ad75a8847ba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const canvas = document.getElementById('whiteboard');
    const ctx = canvas.getContext('2d');
    
    let currentClass = "Alpha";
    let words = {}; 
    let isDrawing = false, isDragging = false, draggedId = null;
    let lastX = 0, lastY = 0;
    let offsetX = 0, offsetY = 0; // Voor soepel slepen

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    };

    const start = (e) => {
        if (e.type === 'touchstart') e.preventDefault();
        const { x, y } = getPos(e);
        
        draggedId = null;
        isDragging = false;
        isDrawing = false;

        // Check of we een tekstvak raken (we lopen de keys af)
        // Tip: we gebruiken hier de huidige 'words' die we in de onValue bijhouden
        for (let id in words) {
            const w = words[id];
            if (w.type === 'text') {
                ctx.font = "bold 22px 'Segoe UI'";
                const textWidth = ctx.measureText(w.text).width;
                // Hitbox: x tot x+breedte, y-30 tot y (omdat tekst vanaf baseline getekend wordt)
                if (x > w.x - 10 && x < w.x + textWidth + 10 && y > w.y - 30 && y < w.y + 10) {
                    draggedId = id;
                    isDragging = true;
                    offsetX = x - w.x;
                    offsetY = y - w.y;
                    break;
                }
            }
        }

        if (!isDragging) {
            isDrawing = true;
            lastX = x; 
            lastY = y;
            push(ref(db, `classes/${currentClass}/board`), { 
                type: 'lineStart',
                x: x, 
                y: y
            });
        }
    };

    const move = (e) => {
        if (!isDrawing && !isDragging) return;
        if (e.type === 'touchmove') e.preventDefault();
        
        const { x, y } = getPos(e);

        if (isDragging && draggedId) {
            update(ref(db, `classes/${currentClass}/board/${draggedId}`), { 
                x: x - offsetX, 
                y: y - offsetY 
            });
        } 
        else if (isDrawing) {
            const distance = Math.hypot(x - lastX, y - lastY);
            if (distance < 3) return; 
            
            push(ref(db, `classes/${currentClass}/board`), { 
                type: 'lineTo',
                x: x, 
                y: y
            });
            
            lastX = x;
            lastY = y;
        }
    };

    const stop = () => {
        isDrawing = false;
        isDragging = false;
        draggedId = null;
    };

    canvas.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    
    canvas.addEventListener('touchstart', start, { passive: false });
    window.addEventListener('touchmove', move, { passive: false });
    window.addEventListener('touchend', stop);

    document.getElementById('addBtn').onclick = () => {
        const val = document.getElementById('wordInput').value.trim();
        if(val) {
            push(ref(db, `classes/${currentClass}/board`), {
                type: 'text',
                text: val, 
                x: 100, 
                y: 100
            });
            document.getElementById('wordInput').value = '';
        }
    };

    // De verbeterde render-loop met snap.forEach
    onValue(ref(db, `classes/${currentClass}/board`), snap => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        words = snap.val() || {}; // Update lokale kopie voor de hitbox-check
        
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = "#4b5563"; 
        
        // Gebruik snap.forEach om chronologische volgorde te garanderen
        snap.forEach((childSnap) => {
            const item = childSnap.val();
            
            if (item.type === 'text') {
                ctx.font = "bold 22px 'Segoe UI'";
                ctx.fillStyle = "#4b5563";
                ctx.fillText(item.text, item.x, item.y);
            } 
            else if (item.type === 'lineStart') {
                ctx.beginPath();
                ctx.moveTo(item.x, item.y);
            }
            else if (item.type === 'lineTo') {
                ctx.lineTo(item.x, item.y);
                ctx.stroke();
            }
        });
        
        document.getElementById('status').textContent = `Klasse: ${currentClass} | Items: ${snap.numChildren()}`;
    });

    document.getElementById('clearBtn').onclick = () => {
        if (confirm('Weet je zeker dat je alles wilt wissen?')) {
            remove(ref(db, `classes/${currentClass}/board`));
        }
    };
</script>
</body>
</html>
