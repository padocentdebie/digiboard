<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digibord Pro - Zinsbouw v3</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; overflow: hidden; }
        #board-container { 
            position: relative; width: 95vw; height: 75vh; 
            background: white; margin: 10px auto; border: 2px solid #003082; 
            border-radius: 8px; touch-action: none;
        }
        canvas { width: 100%; height: 100%; display: block; }
        .toolbar { 
            position: fixed; bottom: 0; width: 100%; background: white; 
            padding: 15px; display: flex; gap: 10px; justify-content: center;
            border-top: 2px solid #ddd; z-index: 100;
        }
        input { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; }
        #addBtn { background: #003082; }
        #clearBtn { background: #d32f2f; }
        #status { 
            position: absolute; top: 10px; right: 20px; padding: 5px 15px; 
            border-radius: 20px; font-size: 12px; font-weight: bold;
            background: #ffeeee; color: #d32f2f; border: 1px solid #d32f2f;
        }
        #status.online { background: #eeffee; color: #2e7d32; border: 1px solid #2e7d32; }
    </style>
</head>
<body>

<div id="board-container">
    <canvas id="whiteboard" width="1200" height="800"></canvas>
    <div id="status">Status: Offline / Verbinden...</div>
</div>

<div class="toolbar">
    <input type="text" id="wordInput" placeholder="Typ tekst of zinsdeel...">
    <button id="addBtn" class="btn">Toevoegen</button>
    <button id="clearBtn" class="btn">Bord Wissen</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3_rzoZOWytlyAbYKKe_WuFlD8z2WvbX4",
        authDomain: "aangifteq2les1.firebaseapp.com",
        databaseURL: "https://aangifteq2les1-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aangifteq2les1",
        storageBucket: "aangifteq2les1.firebasestorage.app",
        messagingSenderId: "1071661084879",
        appId: "1:1071661084879:web:ec81dfed806ad75a8847ba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const canvas = document.getElementById('whiteboard');
    const ctx = canvas.getContext('2d');
    const statusLabel = document.getElementById('status');
    const currentClass = "Alpha";

    let objects = {};
    let isDragging = false;
    let draggedId = null;
    let offsetX = 0, offsetY = 0;

    // --- VERBINDINGSTEST ---
    const connectedRef = ref(db, ".info/connected");
    onValue(connectedRef, (snap) => {
        if (snap.val() === true) {
            statusLabel.innerText = "Status: Systeem Online";
            statusLabel.classList.add('online');
        } else {
            statusLabel.innerText = "Status: Offline / Verbinden...";
            statusLabel.classList.remove('online');
        }
    });

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    };

    canvas.addEventListener('mousedown', (e) => {
        const { x, y } = getPos(e);
        const entries = Object.entries(objects).reverse();
        for (const [id, obj] of entries) {
            ctx.font = "bold 24px Arial";
            const w = ctx.measureText(obj.text).width;
            if (x > obj.x && x < obj.x + w && y > obj.y - 24 && y < obj.y) {
                draggedId = id;
                isDragging = true;
                offsetX = x - obj.x;
                offsetY = y - obj.y;
                return;
            }
        }
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging || !draggedId) return;
        const { x, y } = getPos(e);
        update(ref(db, `classes/${currentClass}/board/${draggedId}`), {
            x: x - offsetX,
            y: y - offsetY
        });
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        draggedId = null;
    });

    document.getElementById('addBtn').onclick = () => {
        const val = document.getElementById('wordInput').value.trim();
        if (val) {
            push(ref(db, `classes/${currentClass}/board`), {
                type: 'text', text: val, x: 100, y: 100
            });
            document.getElementById('wordInput').value = '';
        }
    };

    document.getElementById('clearBtn').onclick = () => {
        if (confirm("Alles wissen?")) remove(ref(db, `classes/${currentClass}/board`));
    };

    // Realtime Sync
    onValue(ref(db, `classes/${currentClass}/board`), (snapshot) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        objects = snapshot.val() || {};
        
        snapshot.forEach((child) => {
            const obj = child.val();
            const isSelected = child.key === draggedId;
            ctx.font = "bold 24px Arial";
            ctx.fillStyle = isSelected ? "#003082" : "#333";
            ctx.fillText(obj.text, obj.x, obj.y);
            if (isSelected) {
                ctx.strokeStyle = "#003082";
                ctx.strokeRect(obj.x - 5, obj.y - 30, ctx.measureText(obj.text).width + 10, 40);
            }
        });
    });
</script>
</body>
</html>
