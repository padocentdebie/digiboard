<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stabiel Digibord</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; overflow: hidden; }
        #board-container { 
            position: relative; width: 95%; max-width: 1200px; aspect-ratio: 12 / 8;
            background: #fafafa; margin: 20px auto; border: 1px solid #d1d5db; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); touch-action: none;
        }
        canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
        .toolbar { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; background: white; padding: 12px; border-radius: 8px; border: 1px solid #d1d5db; z-index: 10; }
        input[type="text"] { padding: 10px; border: 1px solid #d1d5db; border-radius: 4px; width: 200px; font-size: 16px; }
        #addBtn { background: #a78bfa; color: white; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #clearBtn { background: #f3f4f6; color: #4b5563; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        #status { position: absolute; top: 10px; right: 20px; background: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div id="board-container">
    <canvas id="whiteboard" width="1200" height="800"></canvas>
    <div class="toolbar">
        <input type="text" id="wordInput" placeholder="Woord smijten...">
        <button id="addBtn">Smijt op bord</button>
        <button id="clearBtn">Wis alles</button>
    </div>
    <div id="status">Klasse: Alpha</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3_rzoZOWytlyAbYKKe_WuFlD8z2WvbX4",
        authDomain: "aangifteq2les1.firebaseapp.com",
        databaseURL: "https://aangifteq2les1-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aangifteq2les1",
        storageBucket: "aangifteq2les1.firebasestorage.app",
        messagingSenderId: "1071661084879",
        appId: "1:1071661084879:web:ec81dfed806ad75a8847ba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const canvas = document.getElementById('whiteboard');
    const ctx = canvas.getContext('2d');
    
    let currentClass = "Alpha";
    let words = {}; 
    let isDrawing = false, isDragging = false, draggedId = null;
    let lastX = 0, lastY = 0;
    let pendingPoints = []; // Voor het bufferen van punten

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    };

    const start = (e) => {
        e.preventDefault();
        const { x, y } = getPos(e);
        
        // Reset alle tekenstatussen
        lastX = x; 
        lastY = y;
        draggedId = null;
        isDragging = false;
        pendingPoints = [{x, y}]; // Begin met eerste punt

        // Check of we een tekstvak raken
        for (let id in words) {
            const w = words[id];
            if (w.type === 'text' && x > w.x - 20 && x < w.x + 150 && y > w.y - 30 && y < w.y + 10) {
                draggedId = id; 
                isDragging = true; 
                break;
            }
        }

        if (!isDragging) {
            isDrawing = true;
            // Push het startpunt van de lijn
            push(ref(db, `classes/${currentClass}/board`), { 
                type: 'lineStart',
                x: x, 
                y: y
            });
        }
    };

    const move = (e) => {
        if (!isDrawing && !isDragging) return;
        e.preventDefault();
        
        const { x, y } = getPos(e);

        if (isDragging && draggedId) {
            // Update tekstpositie
            update(ref(db, `classes/${currentClass}/board/${draggedId}`), { x, y });
        } 
        else if (isDrawing) {
            // Alleen tekenen als we echt bewegen (minimale afstand)
            const distance = Math.hypot(x - lastX, y - lastY);
            if (distance < 2) return; // Minimale pixelafstand voor vloeiende lijnen
            
            // Push lijnsegment
            push(ref(db, `classes/${currentClass}/board`), { 
                type: 'lineTo',
                x: x, 
                y: y,
                px: lastX, 
                py: lastY
            });
            
            lastX = x;
            lastY = y;
            pendingPoints.push({x, y});
        }
    };

    const stop = (e) => {
        if (e) e.preventDefault();
        
        if (isDrawing && pendingPoints.length > 0) {
            // Markeer het einde van de lijn (optioneel, voor debugging)
            console.log(`Lijn getekend met ${pendingPoints.length} punten`);
        }
        
        isDrawing = false;
        isDragging = false;
        pendingPoints = [];
    };

    // Event listeners met preventDefault voor touch
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('mouseleave', stop); // Stoppen als muis canvas verlaat
    
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', stop);
    canvas.addEventListener('touchcancel', stop);

    document.getElementById('addBtn').onclick = () => {
        const val = document.getElementById('wordInput').value.trim();
        if(val) {
            push(ref(db, `classes/${currentClass}/board`), {
                type: 'text',
                text: val, 
                x: 500, 
                y: 400
            });
            document.getElementById('wordInput').value = '';
        }
    };

    // Tekenfunctie met verbeterde lijnweergave
    onValue(ref(db, `classes/${currentClass}/board`), snap => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        words = snap.val() || {};
        
        // Sorteer items op timestamp voor correcte tekenvolgorde
        const items = Object.values(words);
        
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = "#d1d5db";
        
        let currentPath = null;
        
        items.forEach(item => {
            if (item.type === 'text') {
                ctx.font = "bold 22px 'Segoe UI'";
                ctx.fillStyle = "#4b5563";
                ctx.fillText(item.text, item.x, item.y);
            } 
            else if (item.type === 'lineStart') {
                // Begin een nieuwe lijn
                ctx.beginPath();
                ctx.moveTo(item.x, item.y);
                currentPath = {start: {x: item.x, y: item.y}};
            }
            else if (item.type === 'lineTo' && currentPath) {
                // Teken lijnsegment
                ctx.lineTo(item.x, item.y);
                ctx.stroke();
                // Begin opnieuw voor volgend segment (voorkomt verbindingen)
                ctx.beginPath();
                ctx.moveTo(item.x, item.y);
            }
        });
        
        // Update status
        document.getElementById('status').textContent = `Klasse: ${currentClass} | Items: ${Object.keys(words).length}`;
    });

    document.getElementById('clearBtn').onclick = () => {
        if (confirm('Weet je zeker dat je alles wilt wissen?')) {
            remove(ref(db, `classes/${currentClass}/board`));
        }
    };
</script>
</body>
</html>
